# Local / ad-hoc Docker run (see docker-compose.prod.yml for mitch-cloud).

services:
  thinker:
    build:
      context: .
      args:
        VITE_OLLAMA_MODEL: ${VITE_OLLAMA_MODEL:-mistral:latest}
        VITE_OPENAI_MODEL: ${VITE_OPENAI_MODEL:-gpt-4o-mini}
    image: thinker:latest
    ports:
      - "${PORT:-8080}:80"
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_CONFIGURED: ${OPENAI_CONFIGURED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
