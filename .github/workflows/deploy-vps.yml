name: Deploy to mitch-cloud

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "nginx/**"
      - "vite.config.ts"
      - "scripts/**"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy thinker to mitch-cloud
    needs: build
    if: >-
      github.event_name != 'pull_request' &&
      github.event_name != 'pull_request_target' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        )
      ) &&
      github.event.repository.fork == false
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          fi

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          deploy_dir=/opt/thinker

          ssh "${VPS_USER}@${VPS_HOST}" << 'EOF'
            set -euo pipefail
            mkdir -p /opt/thinker
            docker network ls --format '{{.Name}}' | grep -q '^360ws-network$' || docker network create 360ws-network
          EOF

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.DS_Store' \
            ./ "${VPS_USER}@${VPS_HOST}:${deploy_dir}/"

          ssh "${VPS_USER}@${VPS_HOST}" << 'EOF'
            set -euo pipefail
            cd /opt/thinker
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for thinker-app..."
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if curl -fsS http://127.0.0.1:8055/healthz -o /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              attempt=$((attempt + 1))
              echo "Health check attempt $attempt/$max_attempts failed, retrying..."
              sleep 2
            done

            echo "Health check failed after $max_attempts attempts."
            docker compose -f docker-compose.prod.yml logs app
            exit 1
          EOF

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ thinker deployed to mitch-cloud (thinker.360web.cloud)"}' \
            "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ thinker deployment to mitch-cloud failed"}' \
            "$SLACK_WEBHOOK"
