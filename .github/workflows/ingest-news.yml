name: Ingest news

on:
  schedule:
    # Weekly Monday 12:00 UTC — AllSides + politics/current-events refresh
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ingest RSS → news.json
        run: node scripts/ingest-news.mjs
      - name: Commit if changed
        run: |
          git config user.name "thinker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/content/news.json
          if git diff --staged --quiet; then
            echo "No news changes"
            exit 0
          fi
          git commit -m "chore: refresh politics & current-events news"
          git push
